services:
  postgres:
    image: postgres:15-alpine
    container_name: avatar-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-avatar_db}
      POSTGRES_USER: ${DATABASE_USER:-avatar_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-avatar_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - avatar-network

  redis:
    image: redis:7-alpine
    container_name: avatar-redis
    command: redis-server --appendonly yes --maxmemory 384mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - avatar-network

  # Thin FastAPI API — no heavy ML / no GPU
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avatar-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-avatar_user}:${DATABASE_PASSWORD:-change_this_password}@postgres:5432/${DATABASE_NAME:-avatar_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-6}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - USE_LOCAL_STORAGE=${USE_LOCAL_STORAGE:-true}
      - AVATAR_ENGINE=${AVATAR_ENGINE:-musetalk}
      - STT_URL=${STT_URL:-http://stt:8001}
      - TTS_URL=${TTS_URL:-http://tts:8002}
      - MUSETALK_URL=${MUSETALK_URL:-http://musetalk:8003}
      - TMPDIR=/media
      - MEDIA_ROOT=/media
    volumes:
      - ./backend:/app
      - media_data:/media
      - voice_profiles:/app/voice_profiles
      - avatar_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stt:
        condition: service_healthy
      tts:
        condition: service_healthy
      musetalk:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - avatar-network
    restart: unless-stopped

  # Whisper STT — isolated CUDA Python env
  stt:
    build:
      context: ./services/stt
      dockerfile: Dockerfile
    container_name: avatar-stt
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - TMPDIR=/media
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - media_data:/media
      - whisper_cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - avatar-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Chatterbox TTS — isolated CUDA Python env
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: avatar-tts
    environment:
      - TTS_PROVIDER=${TTS_PROVIDER:-chatterbox}
      - TMPDIR=/media
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - media_data:/media
      - voice_profiles:/app/voice_profiles
      - tts_cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 180s
    networks:
      - avatar-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # MuseTalk lip-sync — isolated CUDA Python env
  musetalk:
    build:
      context: ./services/musetalk
      dockerfile: Dockerfile
    container_name: avatar-musetalk
    environment:
      - AVATAR_ENGINE=${AVATAR_ENGINE:-musetalk}
      - AVATAR_RESOLUTION=${AVATAR_RESOLUTION:-512}
      - AVATAR_FPS=${AVATAR_FPS:-25}
      - MUSETALK_PATH=/app/models/MuseTalk
      - PYTHONPATH=/app/models/MuseTalk
      - TMPDIR=/media
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - media_data:/media
      # Host bind for easy setup via scripts/setup_musetalk.sh
      - ./services/musetalk/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 180s
    networks:
      - avatar-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:8000}
        - NEXT_PUBLIC_SITE_URL=${FRONTEND_URL:-http://localhost:3000}
        - NEXT_PUBLIC_S3_BUCKET_DOMAIN=${S3_BUCKET_NAME}
        - NEXT_PUBLIC_CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}
    container_name: avatar-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:8000}
      - NEXT_PUBLIC_S3_BUCKET_DOMAIN=${S3_BUCKET_NAME}
      - NEXT_PUBLIC_CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - avatar-network
    restart: unless-stopped

  # Thin Celery worker — same slim API image, calls ML services over HTTP
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avatar-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-avatar_user}:${DATABASE_PASSWORD:-change_this_password}@postgres:5432/${DATABASE_NAME:-avatar_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STT_URL=${STT_URL:-http://stt:8001}
      - TTS_URL=${TTS_URL:-http://tts:8002}
      - MUSETALK_URL=${MUSETALK_URL:-http://musetalk:8003}
      - AVATAR_ENGINE=${AVATAR_ENGINE:-musetalk}
      - TMPDIR=/media
      - MEDIA_ROOT=/media
    volumes:
      - ./backend:/app
      - media_data:/media
      - voice_profiles:/app/voice_profiles
      - avatar_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stt:
        condition: service_healthy
      tts:
        condition: service_healthy
      musetalk:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - avatar-network
    restart: unless-stopped

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avatar-flower
    command: celery -A app.celery_app flower --port=5555
    ports:
      # Host 5556 — 5555 is commonly taken on Windows (e.g. MuMu emulator)
      - "127.0.0.1:5556:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5555/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - avatar-network
    restart: unless-stopped

  # Optional local LLM — enable with: docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    container_name: avatar-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - avatar-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  nginx:
    image: nginx:alpine
    container_name: avatar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - avatar-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  voice_profiles:
    driver: local
  avatar_uploads:
    driver: local
  musetalk_models:
    driver: local
  whisper_cache:
    driver: local
  tts_cache:
    driver: local
  ollama_data:
    driver: local

networks:
  avatar-network:
    driver: bridge
