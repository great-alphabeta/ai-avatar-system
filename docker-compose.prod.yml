# Production overrides for AWS GPU deployment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    ports: []  # don't expose DB port publicly
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  redis:
    restart: always
    ports: []  # don't expose Redis port publicly
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  backend:
    restart: always
    env_file: .env.prod
    volumes:
      - media_data:/media
      - voice_profiles:/app/voice_profiles
      - avatar_uploads:/app/uploads
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  stt:
    restart: always
    env_file: .env.prod
    volumes:
      - media_data:/media
      - whisper_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  tts:
    restart: always
    env_file: .env.prod
    volumes:
      - media_data:/media
      - voice_profiles:/app/voice_profiles
      - tts_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  musetalk:
    restart: always
    env_file: .env.prod
    volumes:
      - media_data:/media
      - avatar_uploads:/app/uploads
      - musetalk_models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  frontend:
    restart: always
    env_file: .env.prod
    volumes:
      - /app/node_modules
      - /app/.next
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  celery-worker:
    restart: always
    env_file: .env.prod
    volumes:
      - media_data:/media
      - voice_profiles:/app/voice_profiles
      - avatar_uploads:/app/uploads
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  flower:
    # Disable Flower in production (security risk)
    profiles: ["dev"]

  nginx:
    restart: always
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

volumes:
  media_data:
    driver: local
  musetalk_models:
    driver: local
  whisper_cache:
    driver: local
  tts_cache:
    driver: local
